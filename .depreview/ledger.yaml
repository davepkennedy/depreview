# Example entry:
#
# reviews:
#   - package: lodash
#     ecosystem: npm
#     version: "4.17.21"
#     license: MIT
#     decision: approved       # approved | flagged | rejected
#     reviewed_by: dave
#     reviewed_at: "2026-07-12"
#     rationale: "Standard utility lib, no known issues, widely used"

